name: Claude Review

# Installed by GitHubAI (github.com/bamr87/githubai). Thin caller - logic
# lives in the reusable workflow. Claude reviews every non-draft PR against
# your repo type's standards; label a PR `claude:review` to re-run. Pin the
# ref to a tag for stability.

on:
  pull_request:
    types: [opened, ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions:
  contents: read

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    uses: bamr87/githubai/.github/workflows/claude-review.yml@main
    with:
      pr_number: ${{ inputs.pr_number }}
    secrets: inherit
