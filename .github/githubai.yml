# GitHubAI configuration for this repository (dogfooding the framework).
# Schema reference: docs/configuration.md — merged over profiles/_base.yml
# and profiles/template.yml by actions/load-config.

version: 1

repo:
  type: template
  purpose: >-
    GitHubAI itself - the Claude Code SDLC framework other repositories
    adopt. Consumers reference the workflows, action, and profiles in this
    repo at a ref, so everything here is public API.
  primary_language: yaml

claude:
  model: ""
  max_turns: 60

automation:
  triage:
    enabled: true
  implement:
    enabled: true
  review:
    enabled: true
  auto_merge:
    enabled: true
    allowed_paths:
      - "docs/**"
      - "**/*.md"
      - ".github/dependabot.yml"
  maintenance:
    enabled: true
  release:
    enabled: true

standards:
  test_command: python3 -m pytest -q
  lint_command: python3 tools/unwrap-prose.py --check
  required_files:
    - README.md
    - LICENSE
    - CLAUDE.md
    - docs/README.md
