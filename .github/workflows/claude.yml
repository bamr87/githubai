name: Claude

# GitHubAI - interactive entry point. Mention @claude in an issue or PR
# comment (or open/assign an issue containing @claude) and Claude Code picks
# up the task with full repo context. Repo standards reach Claude through
# CLAUDE.md in the checkout; the automation workflows (claude-*.yml) inject
# profile standards explicitly.
#
# Auth (framework convention): CLAUDE_CODE_OAUTH_TOKEN (from
# `claude setup-token`) is the default; ANTHROPIC_API_KEY is used only when
# the OAuth token is absent. See docs/security.md.
#
# Reusable: call from any repo as
#   uses: bamr87/githubai/.github/workflows/claude.yml@main
#   secrets: inherit

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: Claude Code OAuth token from `claude setup-token` (preferred)
        required: false
      ANTHROPIC_API_KEY:
        description: Anthropic API key, used only when no OAuth token is set
        required: false

permissions:
  contents: read

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN == '' && secrets.ANTHROPIC_API_KEY || '' }}
