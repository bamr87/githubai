name: Agentic Lint

# Validates that the agentic template assets stay well-formed:
#  - Prompt files have YAML frontmatter
#  - Workflow YAML parses
#  - Placeholders aren't left unfilled in committed examples (warn-only)

on:
  pull_request:
    paths:
      - '.github/prompts/**'
      - '.github/instructions/**'
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'examples/workflows/**'
      - 'AGENTS.md'
      - '.vscode/mcp.json'
  push:
    branches: [main]
    paths:
      - '.github/prompts/**'
      - '.github/instructions/**'
      - '.github/workflows/**'
      - 'examples/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate prompt frontmatter
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib, sys, yaml, re
          errors = []
          for p in pathlib.Path(".github/prompts").glob("*.prompt.md"):
              text = p.read_text()
              m = re.match(r"^---\n(.*?)\n---\n", text, re.DOTALL)
              if not m:
                  errors.append(f"{p}: missing YAML frontmatter")
                  continue
              try:
                  meta = yaml.safe_load(m.group(1)) or {}
              except yaml.YAMLError as e:
                  errors.append(f"{p}: invalid YAML frontmatter: {e}")
                  continue
              if "description" not in meta:
                  errors.append(f"{p}: frontmatter missing 'description'")
              if "mode" not in meta and "agent" not in meta:
                  errors.append(f"{p}: frontmatter missing 'mode' (or 'agent')")
          if errors:
              for e in errors: print("::error::" + e)
              sys.exit(1)
          print("All prompt files OK")
          PY

      - name: Validate instruction frontmatter
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib, sys, yaml, re
          errors = []
          for p in pathlib.Path(".github/instructions").glob("*.instructions.md"):
              text = p.read_text()
              m = re.match(r"^---\n(.*?)\n---\n", text, re.DOTALL)
              if not m:
                  errors.append(f"{p}: missing YAML frontmatter")
                  continue
              try:
                  meta = yaml.safe_load(m.group(1)) or {}
              except yaml.YAMLError as e:
                  errors.append(f"{p}: invalid YAML frontmatter: {e}")
                  continue
              if "applyTo" not in meta:
                  errors.append(f"{p}: frontmatter missing 'applyTo'")
          if errors:
              for e in errors: print("::error::" + e)
              sys.exit(1)
          print("All instruction files OK")
          PY

      - name: Validate workflow YAML parses
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib, sys, yaml
          errors = []
          targets = list(pathlib.Path(".github/workflows").glob("*.yml")) \
                  + list(pathlib.Path(".github/workflows").glob("*.yaml")) \
                  + list(pathlib.Path("examples/workflows").glob("*.yml"))
          for p in targets:
              try:
                  yaml.safe_load(p.read_text())
              except yaml.YAMLError as e:
                  errors.append(f"{p}: {e}")
          if errors:
              for e in errors: print("::error::" + e)
              sys.exit(1)
          print(f"Parsed {len(targets)} workflow files OK")
          PY

      - name: Validate issue forms
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib, sys, yaml
          errors = []
          for p in pathlib.Path(".github/ISSUE_TEMPLATE").glob("*.yml"):
              try:
                  data = yaml.safe_load(p.read_text())
              except yaml.YAMLError as e:
                  errors.append(f"{p}: invalid YAML: {e}"); continue
              if not isinstance(data, dict) or "name" not in data or "body" not in data:
                  errors.append(f"{p}: missing required keys (name, body)")
          if errors:
              for e in errors: print("::error::" + e)
              sys.exit(1)
          print("All issue forms OK")
          PY

      - name: Warn on unfilled placeholders in examples
        run: |
          set -euo pipefail
          if grep -RIn --include='*.yml' --include='*.md' '{{[A-Z_]\+}}' examples/workflows AGENTS.md docs/template 2>/dev/null; then
            echo "::warning::Unfilled placeholders found above. This is expected in template files but should be replaced when consumed."
          else
            echo "No placeholders left in examples/docs."
          fi
