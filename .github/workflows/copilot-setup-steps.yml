name: Copilot Setup Steps

# This workflow bootstraps the environment used by the Copilot coding agent
# when it works on this repository. Keep it fast (<5 min) and idempotent.
#
# Docs: https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

on:
  workflow_dispatch:
  workflow_call:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Language toolchains (enable as needed for {{PRIMARY_LANGUAGE}}) ----

      - name: Set up Python
        if: hashFiles('pyproject.toml', 'requirements*.txt', 'setup.py', 'setup.cfg') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        if: hashFiles('requirements*.txt') != ''
        run: |
          python -m pip install --upgrade pip
          for f in requirements*.txt; do
            [ -f "$f" ] && pip install -r "$f"
          done

      - name: Set up Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps
        if: hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Set up Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      # ---- Common tooling ----

      - name: Install gh CLI extensions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh --version
          # Add custom extensions here, e.g.:
          # gh extension install cli/gh-copilot
        continue-on-error: true
