name: CI

# GitHubAI self-tests: validate profiles, config loader, workflow
# conventions (OAuth-first auth, permissions, pinning), template stubs,
# and the installer. Markdown prose style is enforced separately by
# markdown-oneline.yml.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: python -m pip install --quiet -r requirements-dev.txt
      - name: Run test suite
        run: python -m pytest -q

  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check and lint shell scripts
        run: |
          bash -n setup/install.sh
          shellcheck setup/install.sh
