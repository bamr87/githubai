name: Automated Versioning

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.editorconfig'
      - '.github/**'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: false
        default: 'auto'
        type: choice
        options:
        - auto
        - major
        - minor
        - patch

concurrency:
  group: versioning-main

jobs:
  versioning:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create environment file
        run: |
          {
            echo "DEBUG=True"
            echo "SECRET_KEY=github-actions-key"
            echo "DATABASE_URL=sqlite:///db.sqlite3"
            echo "AI_API_KEY=${{ secrets.AI_API_KEY }}"
            echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"
          } > .env

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Run Django migrations
        run: |
          python manage.py migrate --run-syncdb

      - name: Run versioning with auto detection
        if: github.event.inputs.bump_type == 'auto' || github.event.inputs.bump_type == ''
        run: |
          python manage.py bump_version

      - name: Run versioning with specific type
        if: github.event.inputs.bump_type != 'auto' && github.event.inputs.bump_type != ''
        run: |
          python manage.py bump_version --type ${{ github.event.inputs.bump_type }}

      - name: Push version changes
        run: |
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump version [skip ci]"
            git push
          else
            echo "No version changes to commit"
          fi
