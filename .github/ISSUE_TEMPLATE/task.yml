name: Task
description: A concrete, scoped piece of work (chore, docs, refactor). Well-specified tasks are candidates for direct Claude implementation.
labels: ["type:chore"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What needs to change, where, and what "done" looks like.
    validations:
      required: true
  - type: input
    id: verification
    attributes:
      label: How to verify
      description: Command or check that proves the task is complete.
    validations:
      required: false
